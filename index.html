<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohameds GoogleDinoGame Recreation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents bouncing/scrolling on iPad */
            background-color: #222;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            /* Tells the browser NOT to zoom when tapping fast */
            touch-action: manipulation; 
        }

        #game-screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: #00ff00;
            transition: transform 0.1s;
        }

        /* Visual feedback when jumping */
        .jump {
            transform: translateY(-100px);
            background-color: #ff00ff;
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="player" class="box"></div>
        <p style="position: absolute; bottom: 20px;">Press SPACE or TAP Screen</p>
    </div>

    <script>
        const player = document.getElementById('player');

        // This is your main "Action" function
        function triggerJump() {
            // This is where your game logic goes
            player.classList.add('jump');
            
            // Remove the class after a short delay so it can jump again
            setTimeout(() => {
                player.classList.remove('jump');
            }, 200);
            
            console.log("Input detected!");
        }

        // --- THE BRIDGE CODE ---

        // 1. Listen for PC Spacebar
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Prevents page from jumping down
                triggerJump();
            }
        });

        // 2. Listen for iPad/Phone Taps
        // 'touchstart' is instant; 'click' has a delay on mobile
        window.addEventListener('touchstart', (e) => {
            // Prevents the "zoom" or "context menu" from popping up
            e.preventDefault(); 
            triggerJump();
        }, { passive: false });

    </script>
</body>
</html>
