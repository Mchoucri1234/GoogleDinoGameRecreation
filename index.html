<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohamed's Dino Run</title>
    <style>
        body { 
            margin: 0; 
            background: #87CEEB; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace; 
            /* Prevents pulling to refresh on mobile */
            overscroll-behavior: none; 
        }
        
        canvas { 
            display: block; 
            background: #87CEEB; 
            touch-action: none; /* Critical for mobile: stops scrolling while playing */
        }

        #status { 
            position: absolute; 
            top: 15%; 
            left: 50%; 
            transform: translateX(-50%);
            color: #333; 
            font-size: 5vw; /* Responsive size based on screen width */
            font-weight: bold; 
            text-align: center;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            width: 90%;
            pointer-events: none; /* Let clicks pass through to the canvas */
        }

        /* Adjust text for larger screens like iPad/PC so it doesn't get TOO big */
        @media (min-width: 768px) {
            #status { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div id="status">LOADING ASSETS...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');

        const imagePaths = {
            dino: 'dino.png',
            run1: 'dino-run1.png',
            run2: 'dino-run2.png',
            cactus: 'cactus1.png', 
            cloud: 'cloud.png'
        };
        
        const images = {};
        let loadedImages = 0;
        const totalImages = Object.keys(imagePaths).length;

        for (let key in imagePaths) {
            images[key] = new Image();
            images[key].src = imagePaths[key];
            images[key].onload = () => {
                if (++loadedImages === totalImages) {
                    statusDiv.innerHTML = "READY?<br>TAP ON SCREEN OR PRESS SPACE TO START";
                    resize();
                    initGame();
                    requestAnimationFrame(drawLoop);
                }
            };
        }

        let dino, obstacles, clouds, gameSpeed, isGameOver, score, frameCount, gameStarted;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Place ground relative to screen height
            const groundY = canvas.height - 135;
            if (dino) dino.y = groundY; 
        }
        window.addEventListener('resize', resize);

        function initGame() {
            const groundY = canvas.height - 135;
            // Responsive dino size (smaller on mobile)
            const sizeMult = window.innerWidth < 600 ? 0.8 : 1;
            dino = { 
                x: 50, 
                y: groundY, 
                w: 75 * sizeMult, 
                h: 80 * sizeMult, 
                dy: 0, 
                grounded: true 
            };
            obstacles = [];
            clouds = []; 
            gameSpeed = window.innerWidth < 600 ? 4 : 5; // Slightly faster feel on mobile
            score = 0;
            frameCount = 0;
            isGameOver = false;
            gameStarted = false;
        }

        // INPUT HANDLING (Universal)
        function handleAction(e) {
            if (e) e.preventDefault(); // Prevent double triggers on some mobile browsers

            if (!gameStarted) {
                gameStarted = true;
                statusDiv.innerText = "";
                return;
            }
            if (isGameOver) {
                initGame();
                statusDiv.innerText = "";
            } else if (dino.grounded) {
                dino.dy = -18; 
                dino.grounded = false;
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') handleAction();
        });

        // Touch listener for Mobile/iPad
        window.addEventListener('touchstart', handleAction, { passive: false });

        function update() {
            if (!gameStarted || isGameOver) return;

            frameCount++;
            dino.dy += 0.8; 
            dino.y += dino.dy;
            const groundLevel = canvas.height - 135;

            if (dino.y > groundLevel) {
                dino.y = groundLevel;
                dino.dy = 0;
                dino.grounded = true;
            }

            gameSpeed += 0.0015; 
            score += (gameSpeed / 40);

            if (Math.random() < 0.01) {
                clouds.push({ x: canvas.width, y: Math.random() * (canvas.height/3), w: 90, h: 30 });
            }
            clouds.forEach(c => c.x -= 1.5);

            let spawnInterval = Math.max(50, Math.floor(500 / gameSpeed));
            if (frameCount % spawnInterval === 0) {
                // Adjusting hitboxes to be more forgiving on touch screens
                obstacles.push({ x: canvas.width, y: groundLevel - 45, w: 90, h: 90 });
            }

            obstacles.forEach(o => {
                o.x -= gameSpeed;
                // Collision logic
                if (dino.x < o.x + o.w - 20 && dino.x + dino.w - 20 > o.x && 
                    dino.y < o.y + o.h - 10 && dino.y + dino.h - 10 > o.y) {
                    isGameOver = true;
                    statusDiv.innerHTML = "GAME OVER<br>TAP TO RESTART";
                }
            });
            obstacles = obstacles.filter(o => o.x > -200);
        }

        function draw() {
            ctx.fillStyle = "#87CEEB"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            clouds.forEach(c => ctx.drawImage(images.cloud, c.x, c.y, c.w, c.h));

            const groundHeight = 110;
            const groundTop = canvas.height - groundHeight;
            
            // Sand
            ctx.fillStyle = "#f2d16b"; 
            ctx.fillRect(0, groundTop, canvas.width, groundHeight);
            // Ground Line
            ctx.fillStyle = "#dcc06b"; 
            ctx.fillRect(0, groundTop, canvas.width, 6);

            let currentImg = images.dino;
            if (dino.grounded && !isGameOver && gameStarted) {
                currentImg = (Math.floor(frameCount / 8) % 2 === 0) ? images.run1 : images.run2;
            }
            ctx.drawImage(currentImg, dino.x, dino.y, dino.w, dino.h);

            obstacles.forEach(o => {
                ctx.drawImage(images.cactus, o.x, o.y, o.w, o.h);
            });

            // Scoreboard (Adjusted for mobile visibility)
            ctx.fillStyle = "#333";
            const fontSize = window.innerWidth < 600 ? 18 : 22;
            ctx.font = `bold ${fontSize}px 'Courier New'`;
            ctx.fillText(`SCORE: ${Math.floor(score).toString().padStart(5, '0')}`, 20, 40);
        }

        function drawLoop() {
            update();
            draw();
            requestAnimationFrame(drawLoop);
        }
    </script>
</body>
</html>
