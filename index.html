<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohameds Dino Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            /* Prevents iPad from zooming or scrolling when you tap fast */
            touch-action: none; 
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* Puts the player at the bottom */
        }

        /* This is the ground line */
        #ground {
            width: 100%;
            height: 2px;
            background-color: #555;
            margin-bottom: 100px; /* Distance from bottom of screen */
        }

        #player {
            width: 50px;
            height: 50px;
            background-color: #00ff00;
            position: absolute;
            bottom: 100px; /* Starts on the ground */
            transition: transform 0.3s cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        /* The Jump Animation */
        .jumping {
            transform: translateY(-150px);
        }

        #instructions {
            position: absolute;
            top: 20px;
            text-align: center;
            padding: 0 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="instructions">
            SPACE to Jump | TAP anywhere on iPad/Phone
        </div>
        
        <div id="player"></div>
        <div id="ground"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        let isJumping = false;

        function jump() {
            if (isJumping) return;
            isJumping = true;

            // Add the jump class
            player.classList.add('jumping');

            // Remove it after the animation finishes
            setTimeout(() => {
                player.classList.remove('jumping');
                isJumping = false;
            }, 300); 
        }

        // --- CONTROLS ---

        // PC Spacebar
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        // Mobile/iPad Tap (Works anywhere on screen)
        window.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Stops iPad from double-tap zooming
            jump();
        }, { passive: false });

        // Fallback for some browsers
        window.addEventListener('mousedown', (e) => {
            if(e.button === 0) jump();
        });

    </script>
</body>
</html>
