<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Tap Test</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 90%;
        }

        /* The Button: Using 'cursor: pointer' is a hint to iOS that it's clickable */
        .touch-button {
            background-color: #007AFF;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer; 
            transition: transform 0.1s, background-color 0.2s;
            /* Prevents the grey highlight box on iOS */
            -webkit-tap-highlight-color: transparent; 
        }

        /* Visual feedback for PC */
        .touch-button:hover {
            background-color: #0056b3;
        }

        /* Visual feedback for iPad/Mobile Taps */
        .touch-button:active {
            transform: scale(0.95);
            background-color: #004494;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Device Compatibility Test</h2>
        <p>Tap the button below. It works on Mouse, Trackpad, and Touch.</p>
        
        <button id="myButton" class="touch-button">Click / Tap Me</button>
        
        <div id="status">Waiting for interaction...</div>
    </div>

    <script>
        const btn = document.getElementById('myButton');
        const status = document.getElementById('status');
        let count = 0;

        // The 'click' event is universal. 
        // Modern browsers translate a 'tap' into a 'click' automatically.
        btn.addEventListener('click', function(e) {
            count++;
            status.innerText = `Success! Interaction count: ${count}`;
            console.log("Button interacted with at:", new Date().toLocaleTimeString());
        });
    </script>
</body>
</html>
