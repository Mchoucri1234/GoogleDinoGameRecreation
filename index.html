<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohameds GoogleDinoGame Recreation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            touch-action: none; /* Prevents ALL browser gestures like pinch-to-zoom */
        }

        #game-screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none; /* Prevents text selection while tapping */
            -webkit-user-select: none;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: #00ff00;
            transition: transform 0.1s;
        }

        .jump {
            transform: translateY(-150px); /* Increased jump height for visibility */
            background-color: #ff00ff;
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="player" class="box"></div>
        <p style="position: absolute; bottom: 40px; text-align: center; width: 100%;">
            Press SPACE or TAP Screen to Jump
        </p>
    </div>

    <script>
        const player = document.getElementById('player');
        let isJumping = false;

        function triggerJump() {
            if (isJumping) return; // Prevent double-jumping mid-air
            
            isJumping = true;
            player.classList.add('jump');
            
            console.log("Jump Triggered!");

            setTimeout(() => {
                player.classList.remove('jump');
                isJumping = false;
            }, 300); // Match this to your jump speed
        }

        // 1. PC Keyboard
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                triggerJump();
            }
        });

        // 2. iPad/Phone Touch (Instant)
        window.addEventListener('touchstart', (e) => {
            // Check if user is tapping the screen (and not a button if you add one later)
            if (e.target.id === 'game-screen' || e.target.id === 'player' || e.target.tagName === 'BODY') {
                e.preventDefault(); 
                triggerJump();
            }
        }, { passive: false });

        // 3. Fallback Click (For some iPad configurations)
        window.addEventListener('click', (e) => {
            triggerJump();
        });

    </script>
</body>
</html>
